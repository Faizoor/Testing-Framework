execution_config:
  run_type: All   # Sanity / Functional / All
 
testcases:
 
  # ---- S3 File Check ----
  - rule_type: table_exists
    test_type: Sanity
    enabled: true
    object_name: "UUDX_CORE.ERR.UOR_GALAXY_GENERATED_STATEMENTS_ERROR"
    parameters:

 
  # ---- Source vs Target Count ----
  - rule_type: count_check
    test_type: Functional
    enabled: true
    object_name: "UDX_CORE.STAGE.STG_UOR_GALAXY_GENERATED_STATEMENTS_test"
    parameters:
      target_table: "UDX_CORE.CONFORM.GENERATED_STATEMENTS"
      filter_condition: "load_date = CURRENT_DATE"
 
  # ---- Null Check ----
  - rule_type: null_check
    test_type: Functional
    enabled: False
    object_name: "UDX_CORE.STAGE.STG_UOR_GALAXY_GENERATED_STATEMENTS"
    parameters:
      column_name: ["record_content"]
 
  # ---- Duplicate Check ----
  - rule_type: duplicate_check
    test_type: Functional
    enabled: true
    object_name: "CURATED_DB.PROD_SCHEMA.ORDER_TABLE"
    parameters:
      column_name: "ORDER_ID"